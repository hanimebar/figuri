<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="40%" stop-color="#047857"/>
      <stop offset="70%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="trend" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#heroBg)"/>

  <!-- Subtle grid overlay -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-width="0.3" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Large decorative document shape right side -->
  <rect x="720" y="60" width="380" height="510" rx="24" fill="url(#cardBg)" stroke="white" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Document lines -->
  <rect x="760" y="110" width="200" height="8" rx="4" fill="white" opacity="0.4"/>
  <rect x="760" y="130" width="160" height="6" rx="3" fill="white" opacity="0.25"/>
  <rect x="760" y="148" width="180" height="6" rx="3" fill="white" opacity="0.25"/>
  <rect x="760" y="166" width="140" height="6" rx="3" fill="white" opacity="0.25"/>
  <rect x="760" y="192" width="190" height="6" rx="3" fill="white" opacity="0.25"/>
  <rect x="760" y="210" width="150" height="6" rx="3" fill="white" opacity="0.25"/>
  <rect x="760" y="228" width="170" height="6" rx="3" fill="white" opacity="0.25"/>
  <!-- Trend chart on document -->
  <rect x="760" y="270" width="300" height="180" rx="12" fill="white" stroke-opacity="0.05"/>
  <polyline points="780,420 830,390 880,400 940,360 1000,330 1050,310" stroke="url(#trend)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <circle cx="780" cy="420" r="5" fill="#6ee7b7"/>
  <circle cx="830" cy="390" r="5" fill="#6ee7b7"/>
  <circle cx="880" cy="400" r="5" fill="#6ee7b7"/>
  <circle cx="940" cy="360" r="5" fill="#6ee7b7"/>
  <circle cx="1000" cy="330" r="5" fill="#6ee7b7"/>
  <circle cx="1050" cy="310" r="6" fill="#34d399"/>
  <!-- Grid lines on chart -->
  <line x1="760" y1="320" x2="1060" y2="320" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <line x1="760" y1="360" x2="1060" y2="360" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <line x1="760" y1="400" x2="1060" y2="400" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <!-- Small flag label -->
  <rect x="760" y="490" width="60" height="22" rx="11" fill="#f59e0b"/>
  <text x="790" y="505" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="700" fill="white">SENT ✓</text>

  <!-- LEFT: Logo + headline -->
  <!-- Logo mark -->
  <rect x="80" y="80" width="72" height="72" rx="16" fill="#059669" opacity="0.9"/>
  <rect x="96" y="97" width="26" height="34" rx="4" fill="white" opacity="0.15"/>
  <rect x="96" y="97" width="26" height="34" rx="4" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <rect x="101" y="104" width="16" height="2.5" rx="1.25" fill="white" opacity="0.7"/>
  <rect x="101" y="109.5" width="12" height="2.5" rx="1.25" fill="white" opacity="0.7"/>
  <rect x="101" y="115" width="14" height="2.5" rx="1.25" fill="white" opacity="0.7"/>
  <polyline points="102,124 107,119 112,121 119,113" stroke="#6ee7b7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="119" cy="113" r="2.5" fill="#34d399"/>
  <!-- Wordmark -->
  <text x="168" y="132" font-family="Georgia,'Times New Roman',serif" font-size="52" font-weight="700" fill="white" letter-spacing="-1">Figuri</text>

  <!-- Headline -->
  <text x="80" y="220" font-family="-apple-system,'Segoe UI',sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Monthly financial</text>
  <text x="80" y="276" font-family="-apple-system,'Segoe UI',sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">narratives your clients</text>
  <text x="80" y="332" font-family="-apple-system,'Segoe UI',sans-serif" font-size="46" font-weight="700" fill="#6ee7b7" letter-spacing="-0.5">actually read.</text>

  <!-- Sub copy -->
  <text x="80" y="390" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" fill="rgba(255,255,255,0.75)">Plain English · 10 languages · Dispatched in one click</text>

  <!-- Feature pills -->
  <rect x="80" y="430" width="160" height="36" rx="18" fill="white" fill-opacity="0.12" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <text x="160" y="452" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" fill="white" font-weight="500">✦ AI-generated</text>

  <rect x="254" y="430" width="160" height="36" rx="18" fill="white" fill-opacity="0.12" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <text x="334" y="452" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" fill="white" font-weight="500">✦ Multilingual</text>

  <rect x="428" y="430" width="200" height="36" rx="18" fill="white" fill-opacity="0.12" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <text x="528" y="452" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" fill="white" font-weight="500">✦ From £19/month</text>

  <!-- Domain -->
  <text x="80" y="570" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">figuri.actvli.com</text>

  <!-- Gold accent orb top right -->
  <circle cx="1140" cy="80" r="40" fill="#f59e0b" opacity="0.15"/>
  <circle cx="1140" cy="80" r="20" fill="#f59e0b" opacity="0.2"/>
</svg>
